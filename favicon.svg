<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <!-- Sphere gradient: light source top-left -->
    <radialGradient id="sphere" cx="37%" cy="33%" r="65%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="50%"  stop-color="#f0f0f0"/>
      <stop offset="100%" stop-color="#c0c0c0"/>
    </radialGradient>
    <!-- Rim darkening for depth -->
    <radialGradient id="rim" cx="50%" cy="50%" r="50%">
      <stop offset="73%" stop-color="rgba(0,0,0,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.22)"/>
    </radialGradient>
    <!-- Glare highlight top-left -->
    <radialGradient id="glare" cx="34%" cy="27%" r="33%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.72)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <!-- Clip to ball circle -->
    <clipPath id="bc">
      <circle cx="16" cy="16" r="13.5"/>
    </clipPath>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="16.3" cy="29.8" rx="9" ry="1.8" fill="rgba(0,0,0,0.13)"/>

  <!-- Ball surface -->
  <circle cx="16" cy="16" r="13.5" fill="url(#sphere)"/>

  <!--
    Soccer ball patches – truncated icosahedron (Telstar) pattern.
    All 6 pentagons: 1 central + 5 outer.
    Each outer pentagon shares exactly one vertex with the central one;
    white hexagons fill the gaps between them.
    Circumradius = 5.0 for every pentagon; ball radius = 13.5.
  -->
  <g clip-path="url(#bc)" fill="#1a1a1a">
    <!-- Central pentagon (point up) -->
    <polygon points="16,11  20.8,14.5  18.9,20  13.1,20  11.2,14.5"/>
    <!-- Top pentagon (point down, shares top vertex) -->
    <polygon points="16,11  20.8,7.5  18.9,2  13.1,2  11.2,7.5"/>
    <!-- Upper-right pentagon (shares upper-right vertex) -->
    <polygon points="20.8,14.5  22.6,8.9  28.5,8.9  30.3,14.5  25.5,17.9"/>
    <!-- Lower-right pentagon (shares lower-right vertex) -->
    <polygon points="18.9,20  24.8,20  26.6,25.6  21.9,29.1  17.1,25.6"/>
    <!-- Lower-left pentagon (shares lower-left vertex) -->
    <polygon points="13.1,20  14.9,25.6  10.2,29  5.4,25.6  7.2,20"/>
    <!-- Upper-left pentagon (shares upper-left vertex) -->
    <polygon points="11.2,14.5  9.4,8.9  3.5,8.9  1.7,14.5  6.5,18"/>
  </g>

  <!-- Rim shadow overlay (depth) -->
  <circle cx="16" cy="16" r="13.5" fill="url(#rim)"/>

  <!-- Glare overlay (highlight) -->
  <circle cx="16" cy="16" r="13.5" fill="url(#glare)"/>

  <!-- Crisp outer border -->
  <circle cx="16" cy="16" r="13.5" fill="none" stroke="#3a3a3a" stroke-width="0.7"/>
</svg>
