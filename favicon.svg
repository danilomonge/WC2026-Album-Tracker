<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Ball base -->
  <circle cx="16" cy="16" r="15" fill="#f0f0f0" stroke="#111827" stroke-width="1"/>

  <!-- Centre pentagon (point up, radius 6) -->
  <polygon points="16,10 21.7,14.1 19.5,20.9 12.5,20.9 10.3,14.1" fill="#111827"/>

  <!-- 5 outer patches — kept inside the ball circle -->
  <!-- Top-right -->
  <polygon points="16,10 21.7,14.1 28.2,9.5 24,2.5 16,1.5" fill="#111827"/>
  <!-- Right -->
  <polygon points="21.7,14.1 19.5,20.9 28,23 30.5,16" fill="#111827"/>
  <!-- Bottom -->
  <polygon points="19.5,20.9 12.5,20.9 12,29.5 16,31 20,29.5" fill="#111827"/>
  <!-- Left -->
  <polygon points="12.5,20.9 10.3,14.1 1.5,16 4,23" fill="#111827"/>
  <!-- Top-left -->
  <polygon points="10.3,14.1 16,10 16,1.5 8,2.5 3.8,9.5" fill="#111827"/>
</svg>
