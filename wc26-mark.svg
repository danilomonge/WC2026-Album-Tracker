<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="WC2026 Collector">
  <defs>

    <!-- ── Sphere surface: top-left bright white → bottom-right blue-gray ── -->
    <radialGradient id="sph" cx="34%" cy="27%" r="76%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="38%"  stop-color="#f1f6fc"/>
      <stop offset="78%"  stop-color="#c4d4e8"/>
      <stop offset="100%" stop-color="#9fb2c8"/>
    </radialGradient>

    <!-- Pentagon patch: deep navy, same light direction as sphere -->
    <radialGradient id="ptch" cx="34%" cy="27%" r="76%">
      <stop offset="0%"   stop-color="#1f3468"/>
      <stop offset="52%"  stop-color="#0e1e40"/>
      <stop offset="100%" stop-color="#060c1c"/>
    </radialGradient>

    <!-- Rim vignette: dark shadow at edges gives the spherical curve impression -->
    <radialGradient id="vign" cx="50%" cy="50%" r="50%">
      <stop offset="66%"  stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000010" stop-opacity="0.48"/>
    </radialGradient>

    <!-- Soft blur for specular highlight and text glow -->
    <filter id="blur-soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.8"/>
    </filter>

    <!-- Clip to sphere circle -->
    <clipPath id="bc"><circle cx="64" cy="62" r="47"/></clipPath>

  </defs>

  <!-- ══ GROUND SHADOW ══ -->
  <ellipse cx="65" cy="120" rx="36" ry="4.8" fill="#00001a" opacity="0.22"/>

  <!-- ══ SPHERE ══ -->
  <!-- Thin ring: gives clean edge on white backgrounds -->
  <circle cx="64" cy="62" r="47.8" fill="none"
          stroke="#7288a2" stroke-width="0.7" opacity="0.55"/>
  <!-- Surface -->
  <circle cx="64" cy="62" r="47" fill="url(#sph)"/>

  <!-- ══ PENTAGON PATCHES ══ -->
  <!--
    Telstar geometry: circumradius 20, ball center (64,62), top vertex pointing up.
    6 pentagons: 1 central facing viewer + 5 surrounding (partially clipped).
  -->
  <g clip-path="url(#bc)">
    <!-- Central (front-facing) -->
    <polygon points="64,42 83,55.8 75.8,78.2 52.2,78.2 45,55.8"        fill="url(#ptch)"/>
    <!-- Top -->
    <polygon points="64,42 83,28.2 75.8,5.8 52.2,5.8 45,28.2"          fill="url(#ptch)"/>
    <!-- Upper-right -->
    <polygon points="83,55.8 90.3,33.4 113.8,33.4 121,55.8 102,69.6"   fill="url(#ptch)"/>
    <!-- Lower-right -->
    <polygon points="75.8,78.2 99.3,78.2 106.6,100.6 87.6,114.4 68.5,100.6" fill="url(#ptch)"/>
    <!-- Lower-left -->
    <polygon points="52.2,78.2 59.5,100.6 40.4,114.4 21.4,100.6 28.7,78.2"  fill="url(#ptch)"/>
    <!-- Upper-left -->
    <polygon points="45,55.8 26,69.6 7,55.8 14.2,33.4 37.7,33.4"       fill="url(#ptch)"/>
  </g>

  <!-- ══ SEAM LINES ══ -->
  <!-- White outlines on each pentagon edge — creates the stitching/panel pattern -->
  <g clip-path="url(#bc)" fill="none"
     stroke="white" stroke-width="1.4"
     stroke-linejoin="round" stroke-linecap="round" opacity="0.82">
    <polygon points="64,42 83,55.8 75.8,78.2 52.2,78.2 45,55.8"/>
    <polygon points="64,42 83,28.2 75.8,5.8 52.2,5.8 45,28.2"/>
    <polygon points="83,55.8 90.3,33.4 113.8,33.4 121,55.8 102,69.6"/>
    <polygon points="75.8,78.2 99.3,78.2 106.6,100.6 87.6,114.4 68.5,100.6"/>
    <polygon points="52.2,78.2 59.5,100.6 40.4,114.4 21.4,100.6 28.7,78.2"/>
    <polygon points="45,55.8 26,69.6 7,55.8 14.2,33.4 37.7,33.4"/>
  </g>

  <!-- ══ RIM VIGNETTE ══ -->
  <!-- Overlaid on top of patches to unify the sphere shading -->
  <circle cx="64" cy="62" r="47" fill="url(#vign)"/>

  <!-- ══ SPECULAR HIGHLIGHT ══ -->
  <!-- Broad primary glow (blurred white blob, top-left) -->
  <ellipse cx="46" cy="41" rx="17" ry="12"
           fill="white" opacity="0.46"
           transform="rotate(-26 46 41)"
           filter="url(#blur-soft)"/>
  <!-- Sharp hot-spot centre -->
  <ellipse cx="40" cy="36" rx="6.5" ry="4.5"
           fill="white" opacity="0.84"
           transform="rotate(-26 40 36)"/>
  <!-- Tiny bright pinpoint -->
  <ellipse cx="37" cy="33" rx="2.2" ry="1.6"
           fill="white" opacity="0.95"
           transform="rotate(-26 37 33)"/>

  <!-- ══ "26" TEXT ══ -->
  <!-- Soft glow layer under text for legibility -->
  <text x="64" y="70"
        text-anchor="middle"
        font-family="'Arial Black','Impact','Helvetica Neue',sans-serif"
        font-weight="900" font-size="22" letter-spacing="-1"
        fill="white" opacity="0.5"
        filter="url(#blur-soft)">26</text>
  <!-- Crisp white text -->
  <text x="64" y="70"
        text-anchor="middle"
        font-family="'Arial Black','Impact','Helvetica Neue',sans-serif"
        font-weight="900" font-size="22" letter-spacing="-1"
        fill="white">26</text>

</svg>
