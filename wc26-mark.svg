<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="WC2026 Collector">
  <defs>

    <!-- Sphere: bright top-left → cool blue-grey bottom-right -->
    <radialGradient id="sph" cx="33%" cy="26%" r="77%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="34%"  stop-color="#edf3fb"/>
      <stop offset="74%"  stop-color="#becfe6"/>
      <stop offset="100%" stop-color="#96adc6"/>
    </radialGradient>

    <!-- Patch: same light direction as sphere, deep navy -->
    <radialGradient id="ptch" cx="33%" cy="26%" r="77%">
      <stop offset="0%"   stop-color="#26407a"/>
      <stop offset="50%"  stop-color="#10214c"/>
      <stop offset="100%" stop-color="#060c22"/>
    </radialGradient>

    <!-- Rim vignette — gives the sphere its 3-D curve -->
    <radialGradient id="vign" cx="50%" cy="50%" r="50%">
      <stop offset="62%"  stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000015" stop-opacity="0.55"/>
    </radialGradient>

    <!-- Specular blur (used only for the broad soft pre-patch glow) -->
    <filter id="sf" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3.5"/>
    </filter>

    <!-- Specular hot-spot: smooth fade from white to transparent -->
    <radialGradient id="spec" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="white" stop-opacity="0.92"/>
      <stop offset="70%"  stop-color="white" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>

    <!-- Clip to sphere -->
    <clipPath id="bc"><circle cx="64" cy="62" r="47"/></clipPath>

  </defs>

  <!-- ══ GROUND SHADOW ══ -->
  <ellipse cx="65" cy="120" rx="35" ry="4.5" fill="#000015" opacity="0.20"/>

  <!-- ══ SPHERE ══ -->
  <circle cx="64" cy="62" r="47.6" fill="none" stroke="#6080a0" stroke-width="0.7" opacity="0.45"/>
  <circle cx="64" cy="62" r="47" fill="url(#sph)"/>

  <!-- ══ SPECULAR BROAD GLOW ══
       Drawn BEFORE patches — the patches naturally cover the bleed,
       so the glow only shows in the white hexagon areas. -->
  <ellipse cx="44" cy="39" rx="16" ry="12"
           fill="white" opacity="0.55"
           transform="rotate(-26 44 39)"
           filter="url(#sf)"/>

  <!-- ══ PENTAGON PATCHES ══
       Inset ~2 px from the original Telstar vertices so natural
       white "seam" gaps appear between panels — no explicit seam lines. -->
  <g clip-path="url(#bc)">
    <!-- Central -->
    <polygon fill="url(#ptch)" points="64,44 81.1,56.4 74.6,76.6 53.4,76.6 46.9,56.4"/>
    <!-- Top -->
    <polygon fill="url(#ptch)" points="64,40 81.1,27.6 74.6,7.4 53.4,7.4 46.9,27.6"/>
    <!-- Upper-right -->
    <polygon fill="url(#ptch)" points="84.9,55.2 91.5,35 112.6,35 119.1,55.2 102,67.6"/>
    <!-- Lower-right -->
    <polygon fill="url(#ptch)" points="77,79.8 98.1,79.8 104.7,100 87.6,112.4 70.4,100"/>
    <!-- Lower-left -->
    <polygon fill="url(#ptch)" points="51,79.8 57.6,100 40.4,112.4 23.3,100 29.9,79.8"/>
    <!-- Upper-left -->
    <polygon fill="url(#ptch)" points="43.1,55.2 26,67.6 8.9,55.2 15.4,35 36.5,35"/>
  </g>

  <!-- ══ RIM VIGNETTE ══ -->
  <circle cx="64" cy="62" r="47" fill="url(#vign)"/>

  <!-- ══ SPECULAR HOT-SPOT ══
       Single smooth gradient ellipse — no multi-element cloud artifacts.
       Centre (47,41) sits inside the top-left white hexagon area. -->
  <ellipse cx="47" cy="41" rx="11" ry="8"
           fill="url(#spec)"
           transform="rotate(-26 47 41)"/>

  <!-- ══ "26" ══
       Crisp white — no blur — centred on the front pentagon. -->
  <text x="64" y="72"
        text-anchor="middle"
        font-family="'Arial Black','Impact','Helvetica Neue',sans-serif"
        font-weight="900"
        font-size="25"
        letter-spacing="-1"
        fill="white">26</text>

</svg>
