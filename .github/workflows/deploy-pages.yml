name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      has_pages: ${{ steps.detect.outputs.has_pages }}
    steps:
      - name: Detect Pages status
        id: detect
        run: echo "has_pages=${{ github.event.repository.has_pages }}" >> "$GITHUB_OUTPUT"

  deploy:
    needs: prepare
    if: ${{ needs.prepare.outputs.has_pages == 'true' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare static site
        run: |
          rm -rf _site
          mkdir -p _site
          cp index.html tailwind.css styles.css app.js data.js favicon.svg .nojekyll _site/

      - name: Upload static artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
