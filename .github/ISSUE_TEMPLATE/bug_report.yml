name: Bug report
description: Report reproducible incorrect behavior.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: "Thanks for reporting. Do not include passwords, tokens, or personal data."
  - type: textarea
    id: summary
    attributes:
      label: Description
      description: What happened and what did you expect?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: "1. Open...\n2. Select...\n3. Observe..."
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: URL or environment
      placeholder: "GitHub Pages or http://localhost:5500"
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser and device
      placeholder: "Safari 26 on iPhone / Chrome on macOS"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Non-sensitive console messages
      description: Paste only errors that do not reveal credentials or tokens.
  - type: checkboxes
    id: security
    attributes:
      label: Security
      options:
        - label: I confirm that this report does not disclose a vulnerability or sensitive information.
          required: true
