<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' https://esm.sh; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self' https://esm.sh https://*.supabase.co; img-src 'self' data:; object-src 'none'; base-uri 'self'; form-action 'self'"
    />
    <meta name="referrer" content="no-referrer" />
    <title>WC2026 Collector · Edición Alemania</title>
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png?v=5" />
    <link rel="shortcut icon" href="./favicon.ico?v=5" />
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png?v=5" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Anybody:wght@400;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./tailwind.css" />
    <link rel="stylesheet" href="./styles.css" />
    <script type="module" src="./app.js"></script>
  </head>
  <body class="bg-background text-on-background font-body antialiased min-h-screen flex flex-col">
    <!-- TOP BAR: logo + search + auth -->
    <nav
      class="fixed top-0 left-0 right-0 z-40 bg-surface border-b border-outline-variant shadow-sm h-14 px-4 md:px-8 flex items-center justify-between gap-2 sm:gap-4"
    >
      <button id="logo-home" class="flex items-center gap-2 font-display text-xl sm:text-2xl md:text-3xl font-black text-primary tracking-tight whitespace-nowrap hover:opacity-80 transition-opacity flex-shrink-0">
        <span class="logo-home__brand"><img class="logo-home__ball" src="./soccer-ball-logo.png?v=5" alt="" aria-hidden="true" />WC2026</span><span class="hidden sm:inline"> Collector</span>
      </button>

      <div class="flex items-center gap-1.5 sm:gap-3 min-w-0">
        <!-- Mobile search toggle -->
        <button id="mobile-search-toggle" class="sm:hidden flex-shrink-0 inline-flex items-center justify-center text-on-surface-variant p-2 rounded-full hover:bg-surface-container transition-colors" title="Buscar">
          <span class="material-symbols-outlined leading-none">search</span>
        </button>

        <div class="relative hidden sm:block">
          <input
            id="query-input"
            type="search"
            placeholder="Buscar país, jugador, número…"
            class="pl-10 pr-4 py-2 bg-surface-container rounded-full border-none focus:ring-2 focus:ring-primary text-sm w-56 md:w-72"
          />
          <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px] leading-none">search</span>
        </div>

        <span id="sync-status" class="hidden md:inline-flex items-center gap-1 text-xs font-label text-on-surface-variant px-2 py-1">
          <span class="w-2 h-2 rounded-full bg-secondary"></span>
          Sincronizado
        </span>
        <span id="config-status" hidden></span>

        <button
          id="auth-trigger"
          class="bg-primary text-on-primary font-label text-xs sm:text-sm font-bold px-3 sm:px-4 py-2 rounded-full hover:bg-primary-container transition-colors shadow-sm max-w-[7.5rem] sm:max-w-none truncate"
        >
          Iniciar sesión
        </button>
        <button
          id="sign-out-button"
          class="inline-flex items-center justify-center flex-shrink-0 text-on-surface-variant p-2 rounded-full transition-colors opacity-30 cursor-not-allowed pointer-events-none"
          title="Cerrar sesión"
        >
          <span class="material-symbols-outlined leading-none">logout</span>
        </button>
      </div>
    </nav>

    <!-- Mobile search panel (slides down below header) -->
    <div id="mobile-search-panel" class="sm:hidden fixed top-14 left-0 right-0 z-30 bg-surface border-b border-outline-variant shadow-sm px-3 py-2 hidden">
      <div class="relative">
        <input
          id="mobile-query-input"
          type="search"
          placeholder="Buscar país, jugador, número…"
          class="w-full pl-10 pr-10 py-2 bg-surface-container rounded-full border-none focus:ring-2 focus:ring-primary text-sm"
        />
        <span class="material-symbols-outlined absolute left-3 top-2.5 text-outline text-[20px]">search</span>
        <button id="mobile-search-close" class="absolute right-2 top-1.5 p-1 text-on-surface-variant rounded-full hover:bg-surface-container-high transition-colors">
          <span class="material-symbols-outlined text-[20px]">close</span>
        </button>
      </div>
    </div>

    <!-- SECTION TABS BAR: desktop-only, below the top bar -->
    <nav
      class="hidden lg:flex fixed top-14 left-0 right-0 z-30 bg-surface border-b border-outline-variant shadow-[0_2px_8px_rgba(0,0,0,0.05)] h-14 px-4 md:px-8 items-stretch overflow-x-auto"
    >
      <div id="section-tabs" class="flex items-stretch gap-1 w-full"></div>
    </nav>

    <!-- LAYOUT -->
    <div class="pt-14 lg:pt-28 pb-24 lg:pb-0 flex flex-1 min-h-0">
      <!-- MAIN -->
      <main class="flex-1 overflow-y-auto pitch-bg min-h-0">
        <div class="max-w-6xl mx-auto px-4 md:px-8 py-4 md:py-6 space-y-4">
          <!-- HEADER CARD -->
          <header id="album-header" hidden class="bg-surface-container-lowest border border-outline-variant rounded-2xl shadow-sm p-6 md:p-8 flex flex-col md:flex-row md:items-center md:justify-between gap-6">
            <div>
              <p class="font-label text-xs text-on-surface-variant uppercase tracking-wider">Panini FIFA World Cup 2026</p>
              <h1 id="section-title" class="font-display text-3xl md:text-5xl font-black text-primary tracking-tight mt-1">
                Todos los cromos
              </h1>
              <p id="results-count" class="text-on-surface-variant mt-2 text-sm">0 stickers visibles</p>
            </div>
            <div class="w-full md:w-80">
              <div class="flex justify-between text-xs font-label font-bold mb-1.5">
                <span class="text-on-surface-variant uppercase tracking-wider" data-i18n="global_progress">Progreso global</span>
                <span id="progress-percent" class="text-primary">0%</span>
              </div>
              <div class="h-3 bg-surface-variant rounded-full overflow-hidden">
                <div id="progress-bar" class="h-full bg-primary transition-all duration-500" style="width: 0%"></div>
              </div>
              <p id="progress-detail" class="text-xs text-on-surface-variant mt-1.5 text-right">0 / 0 stickers</p>
            </div>
          </header>

          <!-- BANNER -->
          <div id="read-only-banner" class="banner" data-tone="muted"></div>

          <!-- CONTROLS -->
          <section id="controls-panel" hidden class="bg-surface-container-lowest border border-outline-variant rounded-2xl shadow-sm p-4 md:p-6 space-y-4">
            <div id="filter-chips" class="flex flex-wrap gap-2"></div>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3">
              <label data-i18n="group_by" class="flex flex-col gap-1 text-xs font-label font-bold uppercase tracking-wider text-on-surface-variant">
                Agrupar por
                <select
                  id="view-mode"
                  class="bg-surface-container border border-outline-variant rounded-lg px-3 py-2 text-sm font-body font-medium text-on-surface focus:ring-2 focus:ring-primary focus:border-primary"
                >
                  <option value="group">Grupo</option>
                  <option value="selection">Selección</option>
                  <option value="page">Página</option>
                </select>
              </label>
              <label data-i18n="group" class="flex flex-col gap-1 text-xs font-label font-bold uppercase tracking-wider text-on-surface-variant">
                Grupo
                <select id="group-select" class="bg-surface-container border border-outline-variant rounded-lg px-3 py-2 text-sm font-body font-medium text-on-surface focus:ring-2 focus:ring-primary focus:border-primary"></select>
              </label>
              <label data-i18n="selection" class="flex flex-col gap-1 text-xs font-label font-bold uppercase tracking-wider text-on-surface-variant">
                Selección
                <select id="team-select" class="bg-surface-container border border-outline-variant rounded-lg px-3 py-2 text-sm font-body font-medium text-on-surface focus:ring-2 focus:ring-primary focus:border-primary"></select>
              </label>
              <label data-i18n="page" class="flex flex-col gap-1 text-xs font-label font-bold uppercase tracking-wider text-on-surface-variant">
                Página
                <select id="page-select" class="bg-surface-container border border-outline-variant rounded-lg px-3 py-2 text-sm font-body font-medium text-on-surface focus:ring-2 focus:ring-primary focus:border-primary"></select>
              </label>
            </div>
          </section>

          <!-- CONTENT -->
          <section id="collection-content" class="space-y-10"></section>
        </div>
      </main>

      <!-- RIGHT STATS -->
      <aside id="app-sidebar" class="hidden xl:flex flex-col sticky top-28 w-72 h-[calc(100vh-7rem)] bg-surface border-l border-outline-variant p-5 space-y-5 overflow-y-auto shadow-[-4px_0_15px_rgba(0,0,0,0.03)]">
        <div>
          <h3 data-i18n="stats" class="font-display text-2xl font-bold text-primary mb-4">Estadísticas</h3>
          <div id="stats-summary" class="grid grid-cols-2 gap-3"></div>
        </div>

        <div class="border-t border-outline-variant pt-6 mt-6 space-y-3">
          <h4 data-i18n="actions" class="font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider">Acciones</h4>
          <button
            id="download-missing-pdf"
            class="w-full flex items-center justify-center gap-2 py-2.5 px-4 bg-surface-container text-on-surface rounded-xl text-sm font-label font-bold hover:bg-surface-variant transition-colors"
          >
            <span class="material-symbols-outlined text-[20px]">picture_as_pdf</span>
            <span data-i18n="pdf_missing">PDF de faltantes</span>
          </button>
          <button
            id="download-repeated-pdf"
            class="w-full flex items-center justify-center gap-2 py-2.5 px-4 bg-surface-container text-on-surface rounded-xl text-sm font-label font-bold hover:bg-surface-variant transition-colors"
          >
            <span class="material-symbols-outlined text-[20px]">picture_as_pdf</span>
            <span data-i18n="pdf_duplicates">PDF de repetidos</span>
          </button>
          <button
            id="open-auth"
            class="w-full flex items-center justify-center gap-2 py-2.5 px-4 text-primary rounded-xl text-sm font-label font-bold hover:bg-surface-container transition-colors"
          >
            <span class="material-symbols-outlined text-[20px]">login</span>
            <span data-i18n="sign_in_register">Iniciar sesión / registro</span>
          </button>
          <button
            id="reset-album"
            class="w-full flex items-center justify-center gap-2 py-2.5 px-4 text-error rounded-xl text-sm font-label font-bold hover:bg-error-container transition-colors"
          >
            <span class="material-symbols-outlined text-[20px]">restart_alt</span>
            <span data-i18n="reset_progress">Reiniciar progreso</span>
          </button>

          <!-- Language toggle -->
          <button
            id="lang-toggle"
            title="Idioma / Language"
            class="w-full flex items-center justify-center gap-2 py-2.5 px-4 text-on-surface-variant rounded-xl text-sm font-label font-bold hover:bg-surface-container transition-colors"
          >
            <span data-i18n="language">Idioma</span>
            <span id="lang-label" class="flex items-center gap-1">
              <span id="lang-from-flag" data-lang="es">🇪🇸</span>
              <span class="text-outline text-xs">→</span>
              <span id="lang-to-flag" data-lang="en">🇬🇧</span>
            </span>
          </button>
        </div>

        <p data-i18n="sync_note" class="text-[10px] text-outline text-center pt-4 border-t border-outline-variant">
          Tu progreso se sincroniza en la nube cuando inicias sesión.
        </p>
      </aside>
    </div>

    <!-- MOBILE BOTTOM NAV -->
    <nav
      id="mobile-nav"
      class="lg:hidden fixed bottom-0 left-0 right-0 z-40 bg-surface border-t border-outline-variant shadow-[0_-4px_12px_rgba(0,0,0,0.06)] px-2 py-2 grid grid-cols-7 gap-1"
    ></nav>

    <!-- AUTH MODAL -->
    <div id="auth-modal" class="fixed inset-0 z-50 bg-black/40 backdrop-blur-sm hidden items-center justify-center p-4" hidden>
      <div class="bg-surface-container-lowest rounded-2xl shadow-2xl w-full max-w-md p-6 relative">
        <button
          class="absolute top-3 right-3 w-8 h-8 rounded-full bg-surface-container hover:bg-surface-variant flex items-center justify-center text-on-surface-variant"
          data-modal-close
          data-modal-close-target="#auth-modal"
        >
          <span class="material-symbols-outlined text-[20px] leading-none">close</span>
        </button>
        <p id="auth-eyebrow" data-i18n="auth.account" class="font-label text-xs uppercase tracking-wider text-on-surface-variant mb-1">Cuenta</p>
        <h3 id="auth-title" class="font-display text-2xl font-bold text-primary mb-4">Iniciar sesión</h3>

        <p id="auth-reset-hint" class="hidden text-sm text-on-surface-variant mb-4 leading-relaxed"></p>

        <!-- OAuth providers -->
        <div id="auth-oauth" class="hidden space-y-2 mb-4">
          <button id="auth-google" class="w-full flex items-center justify-center gap-3 py-2.5 px-4 border border-outline-variant rounded-xl text-sm font-label font-bold text-on-surface hover:bg-surface-container transition-colors">
            <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
            <span data-i18n="auth.google">Continuar con Google</span>
          </button>
        </div>

        <div id="auth-divider" class="hidden flex items-center gap-3 mb-4">
          <div class="flex-1 h-px bg-outline-variant"></div>
          <span data-i18n="auth.or_email" class="text-xs text-outline font-label">o con email</span>
          <div class="flex-1 h-px bg-outline-variant"></div>
        </div>

        <form id="auth-form" class="space-y-4">
          <p id="auth-error" class="hidden text-sm text-error bg-error-container/30 border border-error/30 rounded-lg px-3 py-2"></p>
          <label class="flex flex-col gap-1.5">
            <span data-i18n="auth.email" class="font-label text-xs font-bold uppercase tracking-wider text-on-surface-variant">Email</span>
            <input
              id="auth-email"
              type="email"
              autocomplete="email"
              required
              class="bg-surface-container border border-outline-variant rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-primary focus:border-primary"
            />
          </label>
          <label class="flex flex-col gap-1.5">
            <span data-i18n="auth.password" class="font-label text-xs font-bold uppercase tracking-wider text-on-surface-variant">Contraseña</span>
            <input
              id="auth-password"
              type="password"
              autocomplete="current-password"
              minlength="6"
              required
              class="bg-surface-container border border-outline-variant rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-primary focus:border-primary"
            />
          </label>
          <label id="auth-password-confirm-wrap" class="hidden flex flex-col gap-1.5">
            <span data-i18n="auth.confirm_password" class="font-label text-xs font-bold uppercase tracking-wider text-on-surface-variant">Confirmar contraseña</span>
            <input
              id="auth-password-confirm"
              type="password"
              autocomplete="new-password"
              class="bg-surface-container border border-outline-variant rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-primary focus:border-primary"
            />
          </label>
          <div class="flex justify-end -mt-2">
            <button
              id="forgot-password"
              type="button"
              class="font-label text-xs text-on-surface-variant hover:text-primary transition-colors"
            ><span data-i18n="auth.forgot_password">¿Olvidaste tu contraseña?</span></button>
          </div>
          <button
            id="auth-submit"
            type="submit"
            class="w-full bg-primary text-on-primary font-label font-bold py-3 rounded-xl hover:bg-primary-container transition-colors"
          >
            Entrar
          </button>
        </form>
        <button
          id="toggle-auth-mode"
          class="w-full mt-3 text-sm text-on-surface-variant hover:text-primary py-2 transition-colors"
        >
          ¿No tienes cuenta? Regístrate
        </button>
      </div>
    </div>

    <!-- TOAST -->
    <div
      id="toast"
      class="fixed bottom-24 lg:bottom-6 left-1/2 -translate-x-1/2 bg-on-surface text-surface px-4 py-3 rounded-xl shadow-lg text-sm font-medium opacity-0 pointer-events-none transition-opacity z-50"
    ></div>
  </body>
</html>
